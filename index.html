<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeastRogue Assets</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #1a1a1a;
            color: #fff;
        }
        h1 {
            text-align: center;
            color: #ff6b6b;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .section {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #ff6b6b;
        }
        .section h2 {
            margin-top: 0;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <h1>🐉 BeastRogue Assets</h1>
    <div class="container">
        <div class="section">
            <h2>Beast GIFs</h2>
            <p>644 animated beast sprites and effects</p>
            <p><a href="Beast/" style="color: #4ecdc4;">View Beast Assets →</a></p>
        </div>
        <div class="section">
            <h2>Buff Icons</h2>
            <p>110 buff and debuff status icons</p>
            <p><a href="Buffs icon/" style="color: #4ecdc4;">View Buff Icons →</a></p>
        </div>
        <div class="section">
            <h2>Player Sprites</h2>
            <p>4 player character sprites</p>
            <p><a href="Player/" style="color: #4ecdc4;">View Player Sprites →</a></p>
        </div>
    </div>
</body>
</html>
